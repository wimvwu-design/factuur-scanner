<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>Factuur Dashboard - QR-codes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dark: #9A7A2E;
      --bg: #0A0A0A;
      --bg-card: #111111;
      --bg-card-2: #1A1A1A;
      --bg-card-3: #222222;
      --text: #FFFFFF;
      --text-grey: #CCCCCC;
      --text-muted: #888888;
      --border: rgba(201, 168, 76, 0.15);
      --border-hover: rgba(201, 168, 76, 0.4);
      --accent: #4CAF50;
      --danger: #e74c3c;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      background: rgba(201, 168, 76, 0.15);
      color: var(--gold);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .btn-refresh {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, 0.4);
    }

    .btn-refresh:hover {
      background: rgba(201, 168, 76, 0.08);
      border-color: var(--gold);
    }

    .btn-done {
      background: linear-gradient(135deg, var(--accent), #66BB6A);
      color: white;
      padding: 12px 24px;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(76, 175, 80, 0.25);
    }

    .btn-done:hover {
      box-shadow: 0 6px 24px rgba(76, 175, 80, 0.4);
      transform: translateY(-1px);
    }

    .btn-done:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      filter: grayscale(0.3);
    }

    .empty-state h2 {
      font-family: 'Playfair Display', serif;
      color: var(--text-grey);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 300;
    }

    .instructions {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: var(--text-grey);
    }

    .instructions strong {
      color: var(--gold);
    }

    .instructions-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .qr-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.2s;
    }

    .qr-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .qr-card.removing {
      animation: fadeOut 0.4s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
    }

    .qr-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .qr-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .qr-card-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .qr-card-body {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 20px;
    }

    .qr-card-image {
      flex-shrink: 0;
    }

    .qr-card-image img {
      width: 180px;
      height: 180px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 8px;
    }

    .qr-card-details {
      flex: 1;
      font-size: 14px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }

    .detail-row + .detail-row {
      border-top: 1px solid rgba(201, 168, 76, 0.08);
    }

    .detail-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-weight: 600;
      text-align: right;
      word-break: break-all;
      color: var(--text-grey);
    }

    .detail-amount .detail-value {
      color: var(--gold);
      font-size: 20px;
      font-family: 'Playfair Display', serif;
    }

    .qr-card-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(201, 168, 76, 0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      color: #0A0A0A;
      padding: 12px 28px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      z-index: 1000;
      animation: fadeInUp 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.3);
      display: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 600px) {
      .header {
        padding: 16px;
      }

      .header h1 {
        font-size: 18px;
      }

      .container {
        padding: 16px;
      }

      .qr-grid {
        grid-template-columns: 1fr;
      }

      .qr-card-body {
        flex-direction: column;
        text-align: center;
      }

      .detail-row {
        flex-direction: column;
        text-align: left;
        gap: 2px;
      }

      .detail-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Factuur Dashboard</h1>
    <div class="header-right">
      <span class="badge" id="countBadge">0 facturen</span>
      <button class="btn btn-refresh" onclick="loadQueue()">Vernieuwen</button>
    </div>
  </div>

  <div class="container">
    <div class="instructions">
      <span class="instructions-icon">📷</span>
      <div>
        <strong>Scan de QR-codes met Easy Banking:</strong>
        Open de Easy Banking app op je GSM → tik op QR-code → richt de camera op een QR-code hieronder → bevestig de betaling → klik "Verwerkt" om de factuur te verwijderen.
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Facturen laden...</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let autoRefreshInterval;

    async function loadQueue() {
      const content = document.getElementById('content');

      try {
        const response = await fetch('/api/queue');
        const result = await response.json();

        if (!result.success) throw new Error(result.error);

        const items = result.items;
        document.getElementById('countBadge').textContent = `${items.length} facturen`;

        if (items.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <h2>Geen facturen in de wachtrij</h2>
              <p>Scan facturen via de Factuur Scanner app op je GSM.<br>Ze verschijnen hier automatisch.</p>
            </div>
          `;
          return;
        }

        content.innerHTML = `<div class="qr-grid">${items.map(item => `
          <div class="qr-card" id="card-${item.id}">
            <div class="qr-card-header">
              <div class="qr-card-title">${escapeHtml(item.naam)}</div>
              <div class="qr-card-meta">
                ${item.factuur_nummer ? `Factuur ${escapeHtml(item.factuur_nummer)} · ` : ''}
                ${formatDate(item.created)}
                ${item.vervaldatum ? ` · Vervalt ${escapeHtml(item.vervaldatum)}` : ''}
              </div>
            </div>
            <div class="qr-card-body">
              <div class="qr-card-image">
                <img src="${item.qrcode}" alt="QR-code ${escapeHtml(item.naam)}">
              </div>
              <div class="qr-card-details">
                <div class="detail-row">
                  <span class="detail-label">IBAN</span>
                  <span class="detail-value">${escapeHtml(item.iban)}</span>
                </div>
                <div class="detail-row detail-amount">
                  <span class="detail-label">Bedrag</span>
                  <span class="detail-value">&euro; ${item.bedrag}</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">Mededeling</span>
                  <span class="detail-value">${escapeHtml(item.mededeling || '-')}</span>
                </div>
              </div>
            </div>
            <div class="qr-card-footer">
              <button class="btn btn-done" onclick="markDone('${item.id}')">
                ✅ Verwerkt
              </button>
            </div>
          </div>
        `).join('')}</div>`;
      } catch (error) {
        content.innerHTML = `<div class="empty-state"><p style="color:var(--danger);">Fout: ${error.message}</p></div>`;
      }
    }

    async function markDone(id) {
      const card = document.getElementById(`card-${id}`);
      const btn = card.querySelector('.btn-done');
      btn.disabled = true;
      btn.textContent = 'Verwijderen...';

      try {
        const response = await fetch('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'done', id })
        });

        const result = await response.json();
        if (!result.success) throw new Error(result.error);

        card.classList.add('removing');
        setTimeout(() => {
          loadQueue();
          showToast('Factuur verwijderd uit wachtrij');
        }, 400);
      } catch (error) {
        btn.disabled = false;
        btn.textContent = '✅ Verwerkt';
        showToast('Fout: ' + error.message);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('nl-BE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = '';
      setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    // Load on page load
    loadQueue();

    // Auto-refresh every 10 seconds
    autoRefreshInterval = setInterval(loadQueue, 10000);
  </script>
</body>
</html>
