  <rect x="82" y="82" width="6" height="6" rx="1" fill="#C9A84C" opacity="0.4"/>
  <rect x="90" y="82" width="6" height="6" rx="1" fill="#C9A84C" opacity="0.3"/>
  <rect x="82" y="90" width="6" height="6" rx="1" fill="#C9A84C" opacity="0.3"/>
  <rect x="90" y="90" width="6" height="6" rx="1" fill="#C9A84C" opacity="0.2"/>
</svg>
